services:
  account_db:
    build: ./postgres  # We must use a custom Dockerfile to install WAL-G
    container_name: new_account_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      # Add these for WAL-G internal connections:
      PGUSER: ${POSTGRES_USER}
      PGPASSWORD: ${POSTGRES_PASSWORD}
      PGDATABASE: ${POSTGRES_DB}
      # WAL-G Configuration
      WALG_S3_PREFIX: s3://backups/
      AWS_ACCESS_KEY_ID: admin
      AWS_SECRET_ACCESS_KEY: password123
      AWS_ENDPOINT: http://minio:9000
      AWS_S3_FORCE_PATH_STYLE: "true"
    volumes:
      - account_data:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d:ro
    # We remove the command: postgres here so the Dockerfile entrypoint works
    depends_on:
      - minio

  minio:
    image: minio/minio
    container_name: minio_storage
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
    command: server /data --console-address ":9001"

  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: pgbouncer_proxy
    restart: unless-stopped
    environment:
      # These variables allow PgBouncer to find your database container
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@account_db:5432/${POSTGRES_DB}
    volumes:
      - ./pgbouncer/pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini:ro
      - ./pgbouncer/userlist.txt:/etc/pgbouncer/userlist.txt:ro
    ports:
      - "6432:6432"
    depends_on:
      - account_db

volumes:
  account_data: